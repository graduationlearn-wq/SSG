<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — BeyondSite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
  <style>
    .bg-grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,220,180,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,220,180,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none; z-index: 0;
    }
    .bg-glow { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; }
    .bg-glow-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(0,220,180,0.15) 0%, transparent 70%);
      top: -200px; right: -100px;
      animation: float 20s ease-in-out infinite;
    }
    .bg-glow-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(0,180,130,0.12) 0%, transparent 70%);
      bottom: -150px; left: -100px;
      animation: float 25s ease-in-out infinite reverse;
    }
    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50%       { transform: translate(30px, -30px); }
    }

    .login-wrapper {
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
      padding: 2rem 1rem; position: relative; z-index: 1;
    }

    .login-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px; padding: 3rem 2.5rem;
      width: 100%; max-width: 440px;
      backdrop-filter: blur(20px);
      box-shadow: 0 40px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05);
      animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-brand { text-align: center; margin-bottom: 2rem; }
    .login-brand .logo-icon {
      width: 48px; height: 48px; display: flex;
      align-items: center; justify-content: center;
      margin: 0 auto 0.75rem;
      background: rgba(0,220,180,0.1); border-radius: 12px;
      border: 1px solid rgba(0,220,180,0.2);
    }
    .login-brand .logo-icon svg { width: 24px; height: 24px; }
    .login-brand .logo-text { font-size: 1.5rem; font-weight: 700; color: #fff; }
    .login-brand .logo-accent { color: #2ec97b; }
    .login-brand p { color: rgba(255,255,255,0.5); font-size: 0.9rem; margin-top: 0.4rem; }

    .login-divider {
      display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0;
    }
    .login-divider::before, .login-divider::after {
      content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.1);
    }
    .login-divider span { color: rgba(255,255,255,0.3); font-size: 0.8rem; white-space: nowrap; }

    .btn-google {
      display: flex; align-items: center; justify-content: center;
      gap: 0.75rem; width: 100%; padding: 0.875rem 1.5rem;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px; color: rgba(255,255,255,0.85);
      font-size: 0.95rem; font-weight: 500; cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      text-decoration: none; margin-bottom: 0.5rem;
    }
    .btn-google:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.22);
      transform: translateY(-1px);
    }

    .login-form .form-group { margin-bottom: 1.25rem; }
    .login-form label {
      display: block; font-size: 0.85rem; font-weight: 500;
      color: rgba(255,255,255,0.7); margin-bottom: 0.5rem; letter-spacing: 0.02em;
    }
    .login-form .input-box { position: relative; }
    .login-form input {
      width: 100%; padding: 0.875rem 1rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; color: #fff; font-size: 0.95rem;
      font-family: inherit; outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
    }
    .login-form input::placeholder { color: rgba(255,255,255,0.25); }
    .login-form input:focus {
      border-color: rgba(46,201,123,0.6);
      background: rgba(255,255,255,0.09);
      box-shadow: 0 0 0 3px rgba(46,201,123,0.15);
    }
    .input-icon-right {
      position: absolute; right: 1rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: rgba(255,255,255,0.35);
      cursor: pointer; padding: 0; display: flex; align-items: center;
      transition: color 0.2s;
    }
    .input-icon-right:hover { color: rgba(255,255,255,0.7); }
    .login-form input[type="password"],
    .login-form input[type="text"].password-field { padding-right: 3rem; }

    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .remember-label {
      display: flex; align-items: center; gap: 0.5rem;
      color: rgba(255,255,255,0.55); cursor: pointer; user-select: none;
      margin-bottom: 1.25rem; font-size: 0.875rem;
    }
    .remember-label input[type="checkbox"] {
      accent-color: #2ec97b; width: 15px; height: 15px; cursor: pointer;
      flex-shrink: 0;
    }

    .btn-login {
      width: 100%; padding: 0.9rem 1.5rem;
      background: linear-gradient(135deg, #2ec97b, #1a9955);
      border: none; border-radius: 12px; color: #fff;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      position: relative; overflow: hidden; font-family: inherit;
    }
    .btn-login:hover {
      opacity: 0.92; transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(46,201,123,0.35);
    }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-login .spinner {
      display: none; width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .login-error {
      display: none;
      background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.35);
      border-radius: 10px; color: #fca5a5; font-size: 0.85rem;
      padding: 0.75rem 1rem; margin-bottom: 1.25rem; text-align: center;
    }
    .login-footer {
      text-align: center; margin-top: 1.75rem;
      font-size: 0.875rem; color: rgba(255,255,255,0.4);
    }
    .login-footer a {
      color: #2ec97b; text-decoration: none; font-weight: 500; transition: color 0.2s;
    }
    .login-footer a:hover { color: #4de8a0; }

    .back-home {
      position: fixed; top: 1.25rem; left: 1.25rem;
      display: flex; align-items: center; gap: 0.4rem;
      color: rgba(255,255,255,0.45); text-decoration: none;
      font-size: 0.875rem; font-weight: 500;
      transition: color 0.2s, transform 0.2s; z-index: 10;
    }
    .back-home:hover { color: rgba(255,255,255,0.8); transform: translateX(-3px); }

    /* ── Wizard step indicator ── */
    .wizard-steps {
      display: flex; align-items: center; margin-bottom: 1.75rem;
    }
    .wizard-step { display: flex; align-items: center; gap: 0.45rem; flex: none; }
    .ws-num {
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 600;
      color: rgba(255,255,255,0.28); transition: all 0.25s; flex-shrink: 0;
    }
    .wizard-step.active .ws-num {
      background: rgba(46,201,123,0.12); border-color: #2ec97b; color: #2ec97b;
    }
    .wizard-step.done .ws-num {
      background: #2ec97b; border-color: #2ec97b; color: #fff;
    }
    .ws-label { font-size: 0.78rem; color: rgba(255,255,255,0.22); font-weight: 500; }
    .wizard-step.active .ws-label,
    .wizard-step.done  .ws-label { color: rgba(255,255,255,0.65); }
    .ws-connector { flex: 1; height: 1px; background: rgba(255,255,255,0.08); margin: 0 0.6rem; }

    .wizard-panel { animation: panelIn 0.25s cubic-bezier(0.16,1,0.3,1) both; }
    @keyframes panelIn {
      from { opacity: 0; transform: translateX(12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .wizard-nav { display: flex; gap: 0.75rem; margin-top: 0.5rem; }
    .btn-back {
      padding: 0.9rem 1.2rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; color: rgba(255,255,255,0.5);
      font-size: 0.9rem; font-weight: 500; cursor: pointer;
      transition: background 0.2s, color 0.2s; white-space: nowrap;
      font-family: inherit;
    }
    .btn-back:hover { background: rgba(255,255,255,0.09); color: rgba(255,255,255,0.8); }

    .ws-summary {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.25rem;
    }
    .ws-summary-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.35rem 0; font-size: 0.875rem;
    }
    .ws-summary-row:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,0.06); }
    .ws-summary-row .sr-label { color: rgba(255,255,255,0.38); }
    .ws-summary-row .sr-val {
      color: rgba(255,255,255,0.8); font-weight: 500;
      max-width: 65%; text-align: right;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    body.form-page { cursor: auto !important; }
    body.form-page * { cursor: auto; }
    body.form-page input, body.form-page textarea { cursor: text; }
    body.form-page button, body.form-page a,
    body.form-page .btn-google, body.form-page .btn-login { cursor: pointer; }
  </style>
</head>
<body class="form-page">
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <a href="/" class="back-home">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    Back to Home
  </a>

  <div class="login-wrapper">
    <div class="login-card">

      <div class="login-brand">
        <div class="logo-icon">
          <svg width="24" height="24" viewBox="0 0 20 20" fill="none">
            <rect x="1.5" y="1.5" width="17" height="17" rx="3" stroke="#2ec97b" stroke-width="1.5" fill="rgba(46,201,123,.08)"/>
            <path d="M6 10h8M10 6v8" stroke="#2ec97b" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="logo-text">Beyond<span class="logo-accent">Site</span></span>
        <p>Create your account</p>
      </div>

      <a href="/auth/google" class="btn-google">
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        Continue with Google
      </a>

      <div class="login-divider"><span>or sign up with email</span></div>

      <div class="login-error" id="loginError"></div>

      <form class="login-form" id="registerForm" novalidate>

        <!-- Step indicator -->
        <div class="wizard-steps">
          <div class="wizard-step active" id="ws1">
            <span class="ws-num">1</span>
            <span class="ws-label">Account</span>
          </div>
          <div class="ws-connector"></div>
          <div class="wizard-step" id="ws2">
            <span class="ws-num">2</span>
            <span class="ws-label">Profile</span>
          </div>
          <div class="ws-connector"></div>
          <div class="wizard-step" id="ws3">
            <span class="ws-num">3</span>
            <span class="ws-label">Confirm</span>
          </div>
        </div>

        <!-- ── Step 1: Account credentials ── -->
        <div class="wizard-panel" id="panel1">
          <div class="form-group">
            <label for="registerEmail">Email address</label>
            <div class="input-box">
              <input type="email" id="registerEmail" name="email"
                     placeholder="you@example.com" autocomplete="email">
            </div>
          </div>

          <div class="form-group">
            <label for="registerPassword">Password</label>
            <div class="input-box">
              <input type="password" id="registerPassword" name="password"
                     class="password-field" placeholder="Create a password (min 8 chars)"
                     autocomplete="new-password">
              <button type="button" class="input-icon-right" id="togglePassword" aria-label="Toggle password visibility">
                <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg id="eyeOffIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <div class="input-box">
              <input type="password" id="confirmPassword" name="confirmPassword"
                     class="password-field" placeholder="Re-enter your password"
                     autocomplete="new-password">
            </div>
          </div>

          <button type="button" class="btn-login" onclick="gotoStep(2)">Continue →</button>
        </div>

        <!-- ── Step 2: Profile ── -->
        <div class="wizard-panel" id="panel2" style="display:none">
          <div class="form-row-2">
            <div class="form-group">
              <label for="firstName">First Name</label>
              <div class="input-box">
                <input type="text" id="firstName" name="firstName" placeholder="John">
              </div>
            </div>
            <div class="form-group">
              <label for="lastName">Last Name</label>
              <div class="input-box">
                <input type="text" id="lastName" name="lastName" placeholder="Doe">
              </div>
            </div>
          </div>

          <div class="wizard-nav">
            <button type="button" class="btn-back" onclick="gotoStep(1)">← Back</button>
            <button type="button" class="btn-login" style="flex:1" onclick="gotoStep(3)">Continue →</button>
          </div>
        </div>

        <!-- ── Step 3: Confirm & submit ── -->
        <div class="wizard-panel" id="panel3" style="display:none">
          <div class="ws-summary">
            <div class="ws-summary-row">
              <span class="sr-label">Email</span>
              <span class="sr-val" id="sumEmail">—</span>
            </div>
            <div class="ws-summary-row">
              <span class="sr-label">Name</span>
              <span class="sr-val" id="sumName">—</span>
            </div>
          </div>

          <label class="remember-label">
            <input type="checkbox" id="agreeTerms" name="agreeTerms">
            I agree to the <a href="/terms" style="color:#2ec97b;margin-left:4px">Terms of Service</a>
          </label>

          <div class="wizard-nav">
            <button type="button" class="btn-back" onclick="gotoStep(2)">← Back</button>
            <button type="submit" class="btn-login" style="flex:1" id="registerBtn">
              <span id="registerBtnText">Create Account</span>
              <div class="spinner" id="registerSpinner"></div>
            </button>
          </div>
        </div>

      </form>

      <div class="login-footer">
        Already have an account? <a href="/login">Sign in</a>
      </div>

    </div>
  </div>

  <script>
    // Redirect if already logged in
    (function () {
      const stored = localStorage.getItem('beyondsite_login');
      if (stored) {
        try { if (JSON.parse(stored)?.email) { window.location.href = '/'; return; } } catch (e) {}
      }
    })();

    // ── Password visibility toggle ──
    const toggleBtn = document.getElementById('togglePassword');
    const pwdInput  = document.getElementById('registerPassword');
    const eyeOn     = document.getElementById('eyeIcon');
    const eyeOff    = document.getElementById('eyeOffIcon');
    toggleBtn.addEventListener('click', () => {
      const hidden = pwdInput.type === 'password';
      pwdInput.type        = hidden ? 'text'  : 'password';
      eyeOn.style.display  = hidden ? 'none'  : 'block';
      eyeOff.style.display = hidden ? 'block' : 'none';
    });

    // ── Step state ──
    let currentStep = 1;

    function showError(msg) {
      const el = document.getElementById('loginError');
      el.textContent = msg;
      el.style.display = 'block';
    }
    function clearError() {
      document.getElementById('loginError').style.display = 'none';
    }

    function gotoStep(next) {
      clearError();

      // Validate before moving forward
      if (next > currentStep) {
        if (currentStep === 1) {
          const email    = document.getElementById('registerEmail').value.trim();
          const password = document.getElementById('registerPassword').value;
          const confirm  = document.getElementById('confirmPassword').value;
          if (!email || !password || !confirm) return showError('Please fill in all fields.');
          if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showError('Please enter a valid email address.');
          if (password.length < 8) return showError('Password must be at least 8 characters.');
          if (password !== confirm) return showError('Passwords do not match.');
        }
        if (currentStep === 2) {
          const first = document.getElementById('firstName').value.trim();
          const last  = document.getElementById('lastName').value.trim();
          if (!first || !last) return showError('Please enter your first and last name.');
          // Populate confirm summary
          document.getElementById('sumEmail').textContent = document.getElementById('registerEmail').value.trim();
          document.getElementById('sumName').textContent  = first + ' ' + last;
        }
      }

      // Update step indicator
      const oldWs = document.getElementById('ws' + currentStep);
      const newWs = document.getElementById('ws' + next);
      oldWs.classList.remove('active');
      if (next > currentStep) oldWs.classList.add('done');
      else oldWs.classList.remove('done');
      newWs.classList.remove('done');
      newWs.classList.add('active');

      // Swap panels with animation
      document.getElementById('panel' + currentStep).style.display = 'none';
      const newPanel = document.getElementById('panel' + next);
      newPanel.style.display = 'block';
      newPanel.classList.remove('wizard-panel');
      void newPanel.offsetWidth;          // force reflow to restart animation
      newPanel.classList.add('wizard-panel');

      currentStep = next;
    }

    // ── Submit (step 3) ──
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      if (!document.getElementById('agreeTerms').checked) {
        return showError('Please agree to the Terms of Service.');
      }

      const firstName = document.getElementById('firstName').value.trim();
      const lastName  = document.getElementById('lastName').value.trim();
      const email     = document.getElementById('registerEmail').value.trim();
      const password  = document.getElementById('registerPassword').value;

      const btn     = document.getElementById('registerBtn');
      const btnText = document.getElementById('registerBtnText');
      const spinner = document.getElementById('registerSpinner');

      btn.disabled          = true;
      btnText.style.display = 'none';
      spinner.style.display = 'block';

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ firstName, lastName, email, password })
        });
        const data = await res.json();
        if (res.ok && data.success) {
          window.location.href = data.redirect || '/';
        } else {
          showError(data.error || 'Registration failed. Please try again.');
          if (data.error && /email|password/i.test(data.error)) gotoStep(1);
        }
      } catch (err) {
        showError('Connection error. Please try again.');
      } finally {
        btn.disabled          = false;
        btnText.style.display = 'block';
        spinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
