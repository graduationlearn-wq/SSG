<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — BeyondSite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Background effects (match index.html) ── */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(0,220,180,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,220,180,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    .bg-glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
    }

    .bg-glow-1 {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0,220,180,0.15) 0%, transparent 70%);
      top: -200px;
      right: -100px;
      animation: float 20s ease-in-out infinite;
    }

    .bg-glow-2 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(0,180,130,0.12) 0%, transparent 70%);
      bottom: -150px;
      left: -100px;
      animation: float 25s ease-in-out infinite reverse;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(30px, -30px); }
    }

    /* ── Login-specific overrides ── */
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
      z-index: 1;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 440px;
      backdrop-filter: blur(20px);
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255,255,255,0.05);
      animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-brand {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .login-brand .logo-icon {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 0.75rem;
      background: rgba(0,220,180,0.1);
      border-radius: 12px;
      border: 1px solid rgba(0,220,180,0.2);
    }

    .login-brand .logo-icon svg {
      width: 24px;
      height: 24px;
    }

    .login-brand .logo-text {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
    }

    .login-brand .logo-accent {
      color: #2ec97b;
    }

    .login-brand p {
      color: rgba(255,255,255,0.5);
      font-size: 0.9rem;
      margin-top: 0.4rem;
    }

    /* Divider */
    .login-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
    }

    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }

    .login-divider span {
      color: rgba(255,255,255,0.3);
      font-size: 0.8rem;
      white-space: nowrap;
    }

    /* Google SSO button */
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: 100%;
      padding: 0.875rem 1.5rem;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: rgba(255,255,255,0.85);
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      text-decoration: none;
      margin-bottom: 0.5rem;
    }

    .btn-google:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.22);
      transform: translateY(-1px);
    }

    .btn-google svg {
      flex-shrink: 0;
    }

    /* Form fields */
    .login-form .form-group {
      margin-bottom: 1.25rem;
    }

    .login-form label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: rgba(255,255,255,0.7);
      margin-bottom: 0.5rem;
      letter-spacing: 0.02em;
    }

    .login-form .input-box {
      position: relative;
    }

    .login-form input {
      width: 100%;
      padding: 0.875rem 1rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
    }

    .login-form input::placeholder {
      color: rgba(255,255,255,0.25);
    }

    .login-form input:focus {
      border-color: rgba(0,220,180,0.6);
      background: rgba(255,255,255,0.09);
      box-shadow: 0 0 0 3px rgba(0,220,180,0.15);
    }

    /* Password toggle */
    .input-icon-right {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }

    .input-icon-right:hover {
      color: rgba(255,255,255,0.7);
    }

    .login-form input[type="password"],
    .login-form input[type="text"].password-field {
      padding-right: 3rem;
    }

    /* Row: remember + forgot */
    .login-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
    }

    .remember-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: rgba(255,255,255,0.55);
      cursor: pointer;
      user-select: none;
    }

    .remember-label input[type="checkbox"] {
      accent-color: #00dcb4;
      width: 15px;
      height: 15px;
      cursor: pointer;
    }

    .forgot-link {
      color: #00dcb4;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .forgot-link:hover {
      color: #2ee5c7;
    }

    /* Submit */
    .btn-login {
      width: 100%;
      padding: 0.9rem 1.5rem;
      background: linear-gradient(135deg, #2ec97b, #1a9955);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn-login:hover {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(46,201,123,0.35);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Spinner inside button */
    .btn-login .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #0f0a14;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error message */
    .login-error {
      display: none;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.35);
      border-radius: 10px;
      color: #fca5a5;
      font-size: 0.85rem;
      padding: 0.75rem 1rem;
      margin-bottom: 1.25rem;
      text-align: center;
    }

    /* Dev demo credentials panel — REMOVE before production launch */
    .dev-creds {
      margin-top: 1.5rem;
      padding: 14px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px dashed rgba(167,139,250,0.32);
      border-radius: 12px;
    }
    .dev-creds-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      margin-bottom: 10px;
      text-align: center;
    }
    .dev-creds-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .dev-cred-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      transition: background .15s, border-color .15s, transform .12s;
      display: flex;
      flex-direction: column;
      gap: 3px;
      text-align: left;
      font-family: inherit;
    }
    .dev-cred-btn:hover {
      background: rgba(167,139,250,0.12);
      border-color: rgba(167,139,250,0.45);
      transform: translateY(-1px);
    }
    .dev-cred-role {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #60a5fa;
      margin-bottom: 2px;
    }
    .dev-cred-role.admin { color: #fbbf24; }
    .dev-cred-email {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.85);
      word-break: break-all;
      line-height: 1.3;
    }
    .dev-cred-pw {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.03em;
    }
    @media (max-width: 420px) {
      .dev-creds-row { grid-template-columns: 1fr; }
    }

    /* Sign up link */
    .login-footer {
      text-align: center;
      margin-top: 1.75rem;
      font-size: 0.875rem;
      color: rgba(255,255,255,0.4);
    }

    .login-footer a {
      color: #00dcb4;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .login-footer a:hover {
      color: #2ee5c7;
    }

    /* Back to home */
    .back-home {
      position: fixed;
      top: 1.25rem;
      left: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: rgba(255,255,255,0.45);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.2s, transform 0.2s;
      z-index: 10;
    }

    .back-home:hover {
      color: rgba(255,255,255,0.8);
      transform: translateX(-3px);
    }

    /* ── Cursor fix for login page ── */
    body.form-page {
      cursor: auto !important;
    }
    body.form-page * { cursor: auto; }
    body.form-page input,
    body.form-page textarea { cursor: text; }
    body.form-page button,
    body.form-page a,
    body.form-page .btn-google,
    body.form-page .btn-login,
    body.form-page .input-icon-right,
    body.form-page .remember-label,
    body.form-page .forgot-link,
    body.form-page .login-footer a,
    body.form-page .back-home { cursor: pointer; }
  </style>
</head>
<body class="form-page">
  <!-- Background effects -->
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <!-- Back to home -->
  <a href="/" class="back-home" id="backHomeLink">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    Back to Home
  </a>

  <div class="login-wrapper">
    <div class="login-card">

      <!-- Brand -->
      <div class="login-brand">
        <div class="logo-icon">
          <svg width="24" height="24" viewBox="0 0 20 20" fill="none">
            <rect x="1.5" y="1.5" width="17" height="17" rx="3" stroke="#00dcb4" stroke-width="1.5" fill="rgba(0,220,180,.08)"/>
            <path d="M6 10h8M10 6v8" stroke="#00dcb4" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="logo-text">Beyond<span class="logo-accent">Site</span></span>
        <p>Sign in to your account</p>
      </div>

      <!-- Google SSO -->
      <a href="/auth/google" class="btn-google">
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        Continue with Google
      </a>

      <div class="login-divider">
        <span>or sign in with email</span>
      </div>

      <!-- Error banner -->
      <div class="login-error" id="loginError"></div>

      <!-- Login form -->
      <form class="login-form" id="loginForm" novalidate>
        <div class="form-group">
          <label for="loginEmail">Email address</label>
          <div class="input-box">
            <input
              type="email"
              id="loginEmail"
              name="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            >
          </div>
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <div class="input-box">
            <input
              type="password"
              id="loginPassword"
              name="password"
              class="password-field"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            >
            <button type="button" class="input-icon-right" id="togglePassword" aria-label="Toggle password visibility">
              <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg id="eyeOffIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="login-meta">
          <label class="remember-label">
            <input type="checkbox" id="rememberMe" name="remember">
            Remember me
          </label>
          <a href="/forgot-password" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <span id="loginBtnText">Sign In</span>
          <div class="spinner" id="loginSpinner"></div>
        </button>
      </form>

      <!-- Dev demo credentials — REMOVE before production launch -->
      <div class="dev-creds">
        <div class="dev-creds-label">Demo accounts — click to fill</div>
        <div class="dev-creds-row">
          <button type="button" class="dev-cred-btn" data-email="admin@beyondsite.com" data-password="admin123">
            <span class="dev-cred-role admin">Admin</span>
            <span class="dev-cred-email">admin@beyondsite.com</span>
            <span class="dev-cred-pw">admin123</span>
          </button>
          <button type="button" class="dev-cred-btn" data-email="customer@beyondsite.com" data-password="customer123">
            <span class="dev-cred-role">Customer</span>
            <span class="dev-cred-email">customer@beyondsite.com</span>
            <span class="dev-cred-pw">customer123</span>
          </button>
        </div>
      </div>

      <!-- Sign up CTA -->
      <div class="login-footer">
        Don't have an account? <a href="/register">Sign up free</a>
      </div>

    </div>
  </div>

  <script>
    // Check if already logged in
    (function() {
      const stored = localStorage.getItem('beyondsite_login');
      if (stored) {
        try {
          const data = JSON.parse(stored);
          if (data && data.email) {
            window.location.href = '/';
            return;
          }
        } catch (e) {}
      }
    })();

    // ── Demo credentials — click-to-fill ──
    document.querySelectorAll('.dev-cred-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const emailField = document.getElementById('loginEmail');
        const passField  = document.getElementById('loginPassword');
        emailField.value = btn.dataset.email;
        passField.value  = btn.dataset.password;
        // Quick visual ack — flash a green ring then submit on next click
        btn.style.borderColor = '#34d399';
        setTimeout(() => { btn.style.borderColor = ''; }, 500);
        emailField.focus();
      });
    });

    // ── Password visibility toggle ──
    const toggleBtn = document.getElementById('togglePassword');
    const pwdInput  = document.getElementById('loginPassword');
    const eyeOn     = document.getElementById('eyeIcon');
    const eyeOff    = document.getElementById('eyeOffIcon');

    toggleBtn.addEventListener('click', () => {
      const isHidden = pwdInput.type === 'password';
      pwdInput.type  = isHidden ? 'text' : 'password';
      eyeOn.style.display  = isHidden ? 'none'  : 'block';
      eyeOff.style.display = isHidden ? 'block' : 'none';
    });

    // ── Form submit ──
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email    = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errorEl  = document.getElementById('loginError');
      const btn      = document.getElementById('loginBtn');
      const btnText  = document.getElementById('loginBtnText');
      const spinner  = document.getElementById('loginSpinner');

      errorEl.style.display = 'none';

      if (!email || !password) {
        errorEl.textContent = 'Please fill in all fields.';
        errorEl.style.display = 'block';
        return;
      }

      btn.disabled         = true;
      btnText.style.display = 'none';
      spinner.style.display = 'block';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          // Store login state
          localStorage.setItem('beyondsite_login', JSON.stringify({
            email: email,
            isAdmin: data.isAdmin || false,
            loginTime: Date.now()
          }));
          window.location.href = data.redirect || '/';
        } else {
          errorEl.textContent = data.error || 'Invalid email or password.';
          errorEl.style.display = 'block';
        }
      } catch (err) {
        errorEl.textContent = 'Connection error. Please try again.';
        errorEl.style.display = 'block';
      } finally {
        btn.disabled          = false;
        btnText.style.display = 'block';
        spinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
